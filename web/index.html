<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyseur de logs Apache</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Analyseur de logs Apache</h1>
      <p>Charge un fichier de logs Apache et analyse les statistiques, les menaces, et les comportements suspects.</p>
    </header>

    <div class="controls">
      <div class="file-field">
        <label for="logFile">Fichier de logs :</label>
        <input type="file" id="logFile" accept=".txt" />
      </div>
      <button id="analyseBtn">Analyser</button>
    </div>

    <div id="status" class="panel hidden"></div>

    <div id="summary" class="panel hidden">
      <h2>Résumé</h2>
      <div id="stats"></div>
    </div>

    <div id="threats" class="panel hidden">
      <h2>Détection de menaces</h2>
      <table id="threatTable"></table>
    </div>

    <div id="tables" class="panel hidden">
      <h2>Tableaux</h2>
      <section>
        <h3>Top 10 IPs</h3>
        <table id="topIps"></table>
      </section>
      <section>
        <h3>Top 10 URLs</h3>
        <table id="topUrls"></table>
      </section>
      <section>
        <h3>Top 5 User Agents</h3>
        <table id="topAgents"></table>
      </section>
      <section>
        <h3>Codes HTTP</h3>
        <table id="httpCodes"></table>
      </section>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
